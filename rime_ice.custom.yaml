patch:
  "switches/@1/reset": 1

  # 关闭 emoji
  "switches/@3/reset": 0

  # [] 鍵翻頁（原來 [] 是以詞定字，改為 {} ）
  "key_binder/select_first_character": "braceleft"
  "key_binder/select_last_character": "braceright"
  "key_binder/bindings/@before 0":
    accept: bracketleft
    send: Page_Up
    when: has_menu
  "key_binder/bindings/@before 1":
    accept: bracketright
    send: Page_Down
    when: has_menu

  # 左右箭頭逐個切換候選詞
  "key_binder/bindings/@before 2":
    accept: Left
    send: Up
    when: has_menu
  "key_binder/bindings/@before 3":
    accept: Right
    send: Down
    when: has_menu
